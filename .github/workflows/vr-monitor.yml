name: VR availability monitor

on:
  schedule:
    - cron: "*/30 5-16 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install playwright

      - run: playwright install --with-deps chromium

      - name: Check VR availability
        env:
          TRAVEL_DATE: "2026-12-14"
          FROM_STATION: "Pasila"
          TO_STATION: "Rovaniemi"
          HEADLESS: "true"
        run: python vr_availability_monitor.py

      - name: Create GitHub issue notification
        if: hashFiles('alert.md') != ''
        run: |
          gh issue create \
            --title "VR tickets after 12 Dec may now be available" \
            --body-file alert.md
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload debug screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vr-debug
          path: |
            vr-availability-debug.png
            alert.md
